<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Company Profile Card</title>

  <link rel="stylesheet" href="styles.css">

  <style>
    article {
      background-color: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      max-width: 300px;
      margin: auto;
    }
  </style>
</head>

<body>

  <header>
    <h1>Juntilla Company</h1>
    <p>Innovation for a Better Tomorrow</p>
  </header>

  <main>
    <article>
      <h2>About Us</h2>
      <p>
        We provide innovative solutions for modern businesses.
      </p>
    </article>
  </main>

  <footer>
    <p>&copy; 2026 Juntilla Company</p>
    <button style="background-color: teal; color: white; padding: 10px 20px;">
      Contact Us
    </button>
  </footer>

</body>
</html>
